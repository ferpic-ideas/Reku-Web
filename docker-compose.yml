name: reku-web

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging: *json-logging

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: "256m"
    logging: *json-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reku_web}
      POSTGRES_USER: ${POSTGRES_USER:-reku_web}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    <<: *hardening
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://www.reku.io}
      PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-reku_web}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-reku_web}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_SECURE: ${SESSION_SECURE:-true}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-259200}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-ferpic@gmail.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      UPLOAD_ROOT: /app/uploads
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      CSV_UPLOAD_MAX_BYTES: ${CSV_UPLOAD_MAX_BYTES:-2097152}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-hola@reku.io}
      PATIENT_INTAKE_TO_EMAIL: ${PATIENT_INTAKE_TO_EMAIL:-altas-pacientes@reku.io}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-Reku <hola@reku.io>}
      EMAIL_DRY_RUN: ${EMAIL_DRY_RUN:-false}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=vicky-recetas_default
      - traefik.http.routers.reku-web.rule=Host(`reku-web.srv1699600.hstgr.cloud`)
      - traefik.http.routers.reku-web.entrypoints=websecure
      - traefik.http.routers.reku-web.tls.certresolver=letsencrypt
      - traefik.http.routers.reku-web.middlewares=reku-web-upload-limit
      - traefik.http.routers.reku-web.service=reku-web
      - traefik.http.routers.reku-web-www.rule=Host(`www.reku.io`)
      - traefik.http.routers.reku-web-www.entrypoints=websecure
      - traefik.http.routers.reku-web-www.tls.certresolver=letsencrypt
      - traefik.http.routers.reku-web-www.middlewares=reku-web-upload-limit
      - traefik.http.routers.reku-web-www.service=reku-web
      - traefik.http.routers.reku-web-apex.rule=Host(`reku.io`)
      - traefik.http.routers.reku-web-apex.entrypoints=websecure
      - traefik.http.routers.reku-web-apex.tls.certresolver=letsencrypt
      - traefik.http.routers.reku-web-apex.middlewares=reku-apex-to-www
      - traefik.http.routers.reku-web-apex.service=reku-web
      - traefik.http.middlewares.reku-apex-to-www.redirectregex.regex=^https?://reku\.io/(.*)
      - traefik.http.middlewares.reku-apex-to-www.redirectregex.replacement=https://www.reku.io/$${1}
      - traefik.http.middlewares.reku-apex-to-www.redirectregex.permanent=true
      - traefik.http.middlewares.reku-web-upload-limit.buffering.maxRequestBodyBytes=${UPLOAD_MAX_BYTES:-10485760}
      - traefik.http.services.reku-web.loadbalancer.server.port=3000
    networks:
      - internal
      - proxy

networks:
  internal:
  proxy:
    external: true
    name: vicky-recetas_default

volumes:
  postgres_data:
