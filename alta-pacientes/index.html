<!doctype html>
<html lang="es">
  <head>
    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Alta de pacientes | Reku</title>
    <meta name="robots" content="noindex, follow" />
    <meta
      name="description"
      content="Formulario de alta de pacientes para Reku."
    />
    <link rel="canonical" href="https://www.reku.io/alta-pacientes/" />

    <meta property="og:locale" content="es_AR" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Alta de pacientes | Reku" />
    <meta
      property="og:description"
      content="Formulario de alta de pacientes para Reku."
    />
    <meta property="og:url" content="https://www.reku.io/alta-pacientes/" />
    <meta property="og:site_name" content="Reku" />
    <meta property="og:image" content="https://www.reku.io/images/og-reku.jpg" />

    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #2f3a68;
        --navy-mid: #3d4d80;
        --navy-light: #eceef5;
        --cyan: #6fc5d2;
        --cyan-dark: #4aa8b8;
        --cyan-light: #edf8fa;
        --muted: #6b7a99;
        --white: #ffffff;
        --gray: #f7f8fc;
        --error: #b54747;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: 'DM Sans', sans-serif;
        color: var(--navy);
        background:
          radial-gradient(circle at 16% 20%, rgba(111, 197, 210, 0.18), transparent 34%),
          linear-gradient(180deg, var(--cyan-light) 0%, #ffffff 58%);
        font-size: 16px;
        line-height: 1.6;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 68px;
        padding: 0 60px;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(47, 58, 104, 0.08);
      }

      .nav-logo {
        display: flex;
        align-items: center;
        text-decoration: none;
      }

      .nav-logo img {
        display: block;
        height: 48px;
        width: auto;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 44px;
        padding: 9px 20px;
        border: none;
        border-radius: 8px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.2s;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.72;
        transform: none;
      }

      .btn-navy {
        background: var(--navy);
        color: var(--white);
      }

      .btn-navy:hover {
        background: var(--navy-mid);
      }

      .btn-ghost {
        color: var(--navy);
        background: transparent;
        border: 1.5px solid rgba(47, 58, 104, 0.2);
      }

      .btn-ghost:hover {
        border-color: var(--navy);
      }

      .btn-lg {
        min-height: 52px;
        padding: 14px 28px;
        border-radius: 10px;
        font-size: 15px;
      }

      main {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 68px);
        padding: 72px 60px 88px;
      }

      .page-shell {
        width: 100%;
        max-width: 920px;
      }

      h1 {
        max-width: 760px;
        margin-bottom: 16px;
        font-family: 'DM Serif Display', serif;
        font-size: clamp(40px, 6vw, 72px);
        font-weight: 400;
        line-height: 0.95;
        color: var(--navy);
      }

      .lead {
        max-width: 620px;
        margin-bottom: 36px;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.6;
      }

      .contact-form-shell {
        max-width: 920px;
        margin: 0 auto;
      }

      .contact-form-card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(47, 58, 104, 0.08);
        border-radius: 24px;
        padding: 32px;
        text-align: left;
        box-shadow: 0 20px 50px rgba(47, 58, 104, 0.08);
      }

      .contact-form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .contact-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .contact-field label {
        color: var(--navy);
        font-size: 13px;
        font-weight: 600;
      }

      .contact-field input {
        width: 100%;
        border: 1px solid rgba(47, 58, 104, 0.14);
        border-radius: 12px;
        padding: 14px 16px;
        font: inherit;
        color: var(--navy);
        background: var(--white);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        appearance: none;
      }

      .contact-field.is-invalid input {
        border-color: rgba(181, 71, 71, 0.72);
        box-shadow: 0 0 0 4px rgba(181, 71, 71, 0.1);
      }

      .contact-field input::placeholder {
        color: rgba(107, 122, 153, 0.7);
      }

      .contact-field input:focus {
        outline: none;
        border-color: rgba(74, 168, 184, 0.8);
        box-shadow: 0 0 0 4px rgba(111, 197, 210, 0.18);
      }

      .field-error {
        min-height: 18px;
        color: var(--error);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.4;
      }

      .field-error:empty {
        visibility: hidden;
      }

      .contact-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .contact-note {
        max-width: 460px;
        color: var(--muted);
        font-size: 13px;
      }

      .contact-status {
        min-height: 24px;
        margin-top: 16px;
        color: var(--navy);
        font-size: 14px;
        font-weight: 500;
      }

      .contact-status.is-error {
        color: var(--error);
      }

      .contact-status.is-success {
        color: var(--cyan-dark);
      }

      .success-modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(47, 58, 104, 0.38);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.2s ease,
          visibility 0.2s ease;
      }

      .success-modal.is-open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .success-modal-card {
        width: min(100%, 440px);
        border: 1px solid rgba(47, 58, 104, 0.08);
        border-radius: 24px;
        padding: 32px;
        background: var(--white);
        box-shadow: 0 24px 70px rgba(47, 58, 104, 0.24);
        text-align: left;
        transform: translateY(8px);
        transition: transform 0.2s ease;
      }

      .success-modal.is-open .success-modal-card {
        transform: translateY(0);
      }

      .success-modal-mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        margin-bottom: 18px;
        border-radius: 999px;
        background: var(--cyan-light);
        color: var(--cyan-dark);
        font-size: 24px;
        font-weight: 600;
      }

      .success-modal-card h2 {
        margin-bottom: 10px;
        font-family: 'DM Serif Display', serif;
        font-size: 32px;
        font-weight: 400;
        line-height: 1.1;
        color: var(--navy);
      }

      .success-modal-card p {
        margin-bottom: 24px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      #success-modal-close {
        display: flex;
        width: min(100%, 180px);
        margin: 0 auto;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 28px 60px;
        border-top: 1px solid rgba(47, 58, 104, 0.08);
        background: var(--white);
        color: var(--muted);
        font-size: 13px;
      }

      .footer-brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .footer-logo {
        display: block;
        height: 30px;
        width: auto;
      }

      .footer-links {
        display: flex;
        gap: 18px;
      }

      .footer-links a {
        color: var(--muted);
        text-decoration: none;
      }

      .footer-links a:hover {
        color: var(--navy);
      }

      @media (max-width: 768px) {
        nav {
          height: 64px;
          padding: 0 20px;
        }

        .nav-logo img {
          height: 44px;
        }

        main {
          min-height: calc(100vh - 64px);
          padding: 48px 20px 64px;
        }

        h1 {
          font-size: 38px;
          line-height: 1.05;
        }

        .lead {
          margin-bottom: 28px;
          font-size: 17px;
        }

        .contact-form-grid {
          grid-template-columns: 1fr;
        }

        .contact-form-card {
          padding: 20px;
          border-radius: 20px;
        }

        .success-modal-card {
          padding: 24px;
          border-radius: 20px;
        }

        .contact-actions {
          align-items: stretch;
        }

        .btn,
        .btn-lg {
          width: 100%;
        }

        footer {
          flex-direction: column;
          align-items: flex-start;
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a class="nav-logo" href="/" aria-label="Reku">
        <img src="/images/logo-reku.svg" alt="Reku" />
      </a>
      <a class="btn btn-ghost" href="/">Volver al sitio</a>
    </nav>

    <main>
      <div class="page-shell">
        <h1>Alta de pacientes</h1>
        <p class="lead">
          Completá tus datos para que el equipo de Reku pueda iniciar el alta y
          contactarte.
        </p>

        <div class="contact-form-shell">
          <form
            class="contact-form-card"
            id="alta-pacientes-form"
            name="alta-pacientes"
            method="POST"
            novalidate
          >
            <input type="hidden" name="reku-form" value="alta-pacientes" />
            <input
              type="hidden"
              name="subject"
              data-remove-prefix
              value="Alta de paciente desde QR - Reku"
            />
            <input type="hidden" name="website" />

            <div class="contact-form-grid">
              <div class="contact-field">
                <label for="nombre">Nombre</label>
                <input
                  id="nombre"
                  name="nombre"
                  type="text"
                  autocomplete="given-name"
                  aria-describedby="nombre-error"
                  required
                />
                <p class="field-error" id="nombre-error" aria-live="polite"></p>
              </div>

              <div class="contact-field">
                <label for="apellido">Apellido</label>
                <input
                  id="apellido"
                  name="apellido"
                  type="text"
                  autocomplete="family-name"
                  aria-describedby="apellido-error"
                  required
                />
                <p class="field-error" id="apellido-error" aria-live="polite"></p>
              </div>

              <div class="contact-field">
                <label for="telefono">Teléfono</label>
                <input
                  id="telefono"
                  name="telefono"
                  type="tel"
                  autocomplete="tel"
                  inputmode="tel"
                  placeholder="+54 9 11 1234 5678"
                  aria-describedby="telefono-error"
                  required
                />
                <p class="field-error" id="telefono-error" aria-live="polite"></p>
              </div>

              <div class="contact-field">
                <label for="email">Mail</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="nombre@email.com"
                  aria-describedby="email-error"
                  required
                />
                <p class="field-error" id="email-error" aria-live="polite"></p>
              </div>
            </div>

            <div class="contact-actions">
              <p class="contact-note">Todos los campos son obligatorios.</p>
              <button type="submit" class="btn btn-navy btn-lg" id="submit-button">
                Enviar
              </button>
            </div>

            <p class="contact-status" id="contact-status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </main>

    <div
      class="success-modal"
      id="success-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="success-modal-title"
      aria-hidden="true"
    >
      <div class="success-modal-card">
        <div class="success-modal-mark" aria-hidden="true">✓</div>
        <h2 id="success-modal-title">Formulario enviado</h2>
        <p>El formulario se envió con éxito. Te contactaremos a la brevedad.</p>
        <button type="button" class="btn btn-navy btn-lg" id="success-modal-close">
          Entendido
        </button>
      </div>
    </div>

    <footer>
      <div class="footer-brand">
        <img class="footer-logo" src="/images/logo-reku.svg" alt="Reku" />
        <span>© 2026 · hola@reku.io</span>
      </div>
      <div class="footer-links">
        <a
          href="https://www.instagram.com/reku_online/"
          target="_blank"
          rel="noopener noreferrer"
          >Instagram</a
        >
        <a
          href="https://www.linkedin.com/company/reku"
          target="_blank"
          rel="noopener noreferrer"
          >LinkedIn</a
        >
      </div>
    </footer>

    <script>
      (() => {
        const form = document.getElementById('alta-pacientes-form');
        const status = document.getElementById('contact-status');
        const submitButton = document.getElementById('submit-button');
        const successModal = document.getElementById('success-modal');
        const successModalClose = document.getElementById('success-modal-close');
        if (!form || !status || !submitButton || !successModal || !successModalClose) return;

        const fields = {
          nombre: form.elements.nombre,
          apellido: form.elements.apellido,
          telefono: form.elements.telefono,
          email: form.elements.email,
        };

        const touchedFields = new Set();
        const namePattern = /^[\p{L}]+(?:[ '-][\p{L}]+)*$/u;
        const phonePattern = /^[+()\d\s.-]+$/;
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

        const setStatus = (message, type) => {
          status.textContent = message;
          status.className = 'contact-status';
          if (type) {
            status.classList.add(`is-${type}`);
          }
        };

        const setFieldError = (field, message) => {
          const wrapper = field.closest('.contact-field');
          const error = document.getElementById(`${field.id}-error`);

          field.setAttribute('aria-invalid', message ? 'true' : 'false');
          wrapper?.classList.toggle('is-invalid', Boolean(message));
          if (error) {
            error.textContent = message;
          }
        };

        const validateTextField = (field, fieldName) => {
          const value = field.value.trim();
          if (!value) {
            return `Ingresá tu ${fieldName}.`;
          }

          if (value.length < 2) {
            return `El ${fieldName} debe tener al menos 2 letras.`;
          }

          if (!namePattern.test(value)) {
            return `Usá solo letras, espacios, apóstrofes o guiones.`;
          }

          return '';
        };

        const validatePhone = (field) => {
          const value = field.value.trim();
          const digits = value.replace(/\D/g, '');

          if (!value) {
            return 'Ingresá tu teléfono.';
          }

          if (!phonePattern.test(value) || digits.length < 8 || digits.length > 15) {
            return 'Ingresá un teléfono válido, con código de área.';
          }

          return '';
        };

        const validateEmail = (field) => {
          const value = field.value.trim();

          if (!value) {
            return 'Ingresá tu mail.';
          }

          if (!emailPattern.test(value)) {
            return 'Ingresá un mail válido, por ejemplo nombre@email.com.';
          }

          return '';
        };

        const validateField = (field) => {
          const validators = {
            nombre: () => validateTextField(field, 'nombre'),
            apellido: () => validateTextField(field, 'apellido'),
            telefono: () => validatePhone(field),
            email: () => validateEmail(field),
          };
          const message = validators[field.name]?.() || '';
          setFieldError(field, message);
          return !message;
        };

        const validateForm = () => {
          let firstInvalidField = null;

          Object.values(fields).forEach((field) => {
            const isValid = validateField(field);
            if (!isValid && !firstInvalidField) {
              firstInvalidField = field;
            }
          });

          if (firstInvalidField) {
            setStatus('Revisá los campos marcados para poder enviar el formulario.', 'error');
            firstInvalidField.focus();
            return false;
          }

          setStatus('');
          return true;
        };

        const closeSuccessModal = () => {
          successModal.classList.remove('is-open');
          successModal.setAttribute('aria-hidden', 'true');
        };

        const openSuccessModal = () => {
          successModal.classList.add('is-open');
          successModal.setAttribute('aria-hidden', 'false');
          successModalClose.focus();
        };

        Object.values(fields).forEach((field) => {
          field.addEventListener('blur', () => {
            touchedFields.add(field.name);
            validateField(field);
          });

          field.addEventListener('input', () => {
            if (touchedFields.has(field.name) || field.getAttribute('aria-invalid') === 'true') {
              validateField(field);
            }
          });
        });

        successModalClose.addEventListener('click', closeSuccessModal);
        successModal.addEventListener('click', (event) => {
          if (event.target === successModal) {
            closeSuccessModal();
          }
        });

        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && successModal.classList.contains('is-open')) {
            closeSuccessModal();
          }
        });

        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          setStatus('');

          Object.keys(fields).forEach((fieldName) => touchedFields.add(fieldName));
          if (!validateForm()) return;

          try {
            fields.nombre.value = fields.nombre.value.trim();
            fields.apellido.value = fields.apellido.value.trim();
            fields.telefono.value = fields.telefono.value.trim();
            fields.email.value = fields.email.value.trim();

            submitButton.disabled = true;
            submitButton.textContent = 'Enviando...';

            const response = await fetch('/', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
              },
              body: new URLSearchParams(new FormData(form)).toString(),
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            form.reset();
            Object.values(fields).forEach((field) => {
              setFieldError(field, '');
            });
            touchedFields.clear();
            openSuccessModal();
          } catch (error) {
            setStatus('No se pudo enviar el formulario. Probá de nuevo.', 'error');
          } finally {
            submitButton.disabled = false;
            submitButton.textContent = 'Enviar';
          }
        });
      })();
    </script>
  </body>
</html>
